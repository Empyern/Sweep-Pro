CONFIG_ZMK_USB=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# soft off
CONFIG_ZMK_PM_SOFT_OFF=n

# sleep
CONFIG_ZMK_SLEEP=n



